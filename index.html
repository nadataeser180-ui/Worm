<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مريم - محرك البحث</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>مريم 🔍</h1>
            <p>محرك البحث عن الموارد والصور</p>
        </header>

        <div class="search-section">
            <form id="searchForm">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="ابحث عن موارد أو صور..."
                    required
                >
                <button type="submit">بحث</button>
            </form>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="images">صور</button>
            <button class="filter-btn" data-filter="resources">موارد</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>جاري البحث...</p>
        </div>

        <div id="results" class="results"></div>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
